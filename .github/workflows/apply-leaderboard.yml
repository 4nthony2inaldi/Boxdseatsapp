name: Apply leaderboard function + indexes

# One-time DDL apply for the leaderboard aggregation function and its supporting
# indexes (docs/leaderboards.md). Run manually once the migration is on main.
# Idempotent (create index if not exists; create or replace function; re-granted),
# safe to re-run.
#
# Requires repository secret DATABASE_URL. Default is a dry run that wraps the
# apply in a rolled-back transaction to validate it runs clean.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Roll back after applying (validate only)"
        type: boolean
        default: true

concurrency:
  group: apply-leaderboard
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration (v2 — season-aware, supersedes v1)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/20260702_leaderboard_v2_season.sql

      - name: Validate (rolled back)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run == 'true' }}
        run: |
          { echo "BEGIN;"; cat supabase/migrations/20260702_leaderboard_v2_season.sql; echo "ROLLBACK;"; } \
            | psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f -

      - name: Smoke test (function returns keys)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "select proname from pg_proc where proname = 'leaderboard';"

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::apply-leaderboard skipped — set the DATABASE_URL repository secret to enable."
