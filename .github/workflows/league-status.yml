name: League status (read-only)

# Prints a per-league snapshot — event count, first event date, most recent
# event date — for monitoring a backfill's progress and parity across leagues.
# Read-only: a single SELECT, no writes. Run manually (Actions -> this workflow
# -> Run workflow); read the result in the "Report" step's log.
#
# Requires the DATABASE_URL repository secret.

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Filter to one sport (blank = all leagues)"
        type: string
        default: "soccer"

concurrency:
  group: league-status
  cancel-in-progress: true

jobs:
  status:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SPORT: ${{ github.event.inputs.sport }}
    steps:
      - name: Report
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          psql "$DATABASE_URL" -P pager=off -v ON_ERROR_STOP=1 -v sport="$SPORT" <<'SQL'
          \echo '=== Per-league event status ==='
          select
            l.display_order as ord,
            l.slug,
            l.name,
            count(e.id)              as events,
            min(e.event_date)::date  as first_event,
            max(e.event_date)::date  as last_event
          from leagues l
          left join events e on e.league_id = l.id
          where (:'sport' = '' or l.sport = :'sport')
          group by l.display_order, l.slug, l.name
          order by l.display_order, l.name;
          SQL

      # Duplicate-club audit. A given ESPN id should map to exactly ONE team row
      # within a sport; a club playing several competitions (Arsenal in eng.1,
      # the Champions League, the FA Cup) must reuse the same row, not spawn one
      # per competition. This catches a regression in the seeder's sharedTeams
      # reuse / sync-events' cross-league team map held.
      #
      # Scoped by the same :sport filter as the report. This matters: a global
      # (sport, espn) check is noisy for college, where men's (ncaam) and
      # women's (ncaaw) programs legitimately share one ESPN id but are separate
      # teams — so that pair is NOT a real duplicate. Within soccer there is no
      # such shared-id case in our data, so soccer rows here are true duplicates.
      - name: Duplicate-club audit
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          psql "$DATABASE_URL" -P pager=off -v ON_ERROR_STOP=1 -v sport="$SPORT" <<'SQL'
          \echo '=== Duplicate clubs: same ESPN id within the filtered sport, >1 team row ==='
          select sub.sport, sub.espn, sub.rows, sub.teams
          from (
            select l.sport,
                   t.external_ids->>'espn'                       as espn,
                   count(*)                                      as rows,
                   string_agg(t.name || ' [' || l.slug || ']', ', ') as teams
            from teams t
            join leagues l on l.id = t.league_id
            where t.external_ids->>'espn' is not null
              and (:'sport' = '' or l.sport = :'sport')
            group by l.sport, t.external_ids->>'espn'
            having count(*) > 1
          ) sub
          order by sub.sport, sub.rows desc, sub.espn
          limit 200;
          SQL

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::league-status skipped — set the DATABASE_URL repository secret to enable."
