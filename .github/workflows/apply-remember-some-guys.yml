name: Apply remember_some_guys functions

# One-time apply for the "Remember Some Guys" sampling functions
# (remember_some_guys + remember_some_guys_system). Run manually once the
# migration is on main. Idempotent (create or replace + grants), safe to re-run.
#
# Requires repository secret DATABASE_URL (direct Postgres). Default is a dry run
# that wraps the apply in a rolled-back transaction to validate it runs clean.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Roll back after applying (validate only)"
        type: boolean
        default: true

concurrency:
  group: apply-remember-some-guys
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/20260630_remember_some_guys.sql

      - name: Validate (rolled back)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run == 'true' }}
        run: |
          { echo "BEGIN;"; cat supabase/migrations/20260630_remember_some_guys.sql; echo "ROLLBACK;"; } \
            | psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f -

      - name: Smoke test (rolled back is fine; functions exist after a real apply)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "select count(*) as system_pool from remember_some_guys_system(12, '{}');"

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::apply-remember-some-guys skipped — set the DATABASE_URL repository secret to enable."
