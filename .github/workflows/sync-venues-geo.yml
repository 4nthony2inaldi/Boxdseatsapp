name: Sync venues-geo.json from DB

# Regenerates public/venues-geo.json (the photo-finder match file) from the live
# DB and opens a PR with the additions. Append-only, so the PR diff is just new
# venues' coordinates — safe to review and merge. Run after a backfill that
# created venues (e.g. a new league) and geocoded them.
#
# Requires the DATABASE_URL repository secret. Default is a dry run (reports the
# count, writes nothing); flip dry_run off to open the PR.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report the count only; don't open a PR"
        type: boolean
        default: true
      leagues:
        description: "Restrict to venues hosting these leagues' events (comma-separated slugs). Blank = all venues with coords."
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-venues-geo
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DRY: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Notice when DATABASE_URL is missing
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          echo "::warning::sync-venues-geo skipped — set the DATABASE_URL repository secret to enable."
          exit 0

      - name: Regenerate venues-geo.json
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          LEAGUES_ARG=""
          if [ -n "${{ github.event.inputs.leagues }}" ]; then
            LEAGUES_ARG="--leagues=${{ github.event.inputs.leagues }}"
          fi
          node scripts/data/sync-venues-geo.mjs $DRY $LEAGUES_ARG

      # Push the regenerated file to a branch and try to open a PR. GitHub
      # Actions is not permitted to create PRs in this repo, so the gh call is
      # expected to fail — we tolerate it and print the compare URL instead, so
      # the run stays green and a human (or the Claude GitHub app) opens the PR
      # from the pushed branch. Without the `|| ...` guard the whole run reports
      # failure on every dispatch even though the regeneration succeeded.
      - name: Push branch and open PR (best-effort)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- public/venues-geo.json; then
            echo "No changes to venues-geo.json — nothing to push."
            exit 0
          fi
          BRANCH="claude/venues-geo-sync-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/venues-geo.json
          git commit -m "Sync venues-geo.json: add newly geocoded venues"
          git push -u origin "$BRANCH"
          if gh pr create --base main --head "$BRANCH" \
               --title "Sync venues-geo.json from DB (new venues)" \
               --body "Append-only regeneration of the photo-finder match file: adds coordinates for venues geocoded in the DB but missing from \`public/venues-geo.json\`. Existing entries are untouched. Generated by the sync-venues-geo workflow."; then
            echo "Opened PR for $BRANCH."
          else
            echo "::warning::Could not open a PR automatically (GitHub Actions cannot create PRs in this repo). Branch pushed: $BRANCH — open a PR here: ${{ github.server_url }}/${{ github.repository }}/compare/main...$BRANCH"
          fi
