name: Audit duplicate venues

# Read-only sweep for likely-duplicate venues, surfaced a few ways:
#   1. shared photo_url (a strong "same venue, seeded twice" signal)
#   2. same city + coordinates within 150m (same physical building), with the
#      geocoding-fallback cluster (many venues dumped at one point) filtered out
#   3. identical normalized name + city
#   4. mojibake names (UTF-8 mis-decoded as latin1; the "A-tilde" byte is the tell)
# Runs inside a READ ONLY transaction that rolls back. Requires DATABASE_URL.
# Review the output, then merge confirmed dups separately.

on:
  workflow_dispatch: {}

concurrency:
  group: audit-duplicate-venues
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Duplicate-venue report (read-only)
        if: ${{ env.DATABASE_URL != '' }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          begin;
          set transaction read only;

          \echo '== 1) Venues sharing a photo_url (strongest same-venue signal) =='
          with grp as (
            select photo_url, count(*) as n
            from venues
            where coalesce(photo_url,'') <> ''
            group by photo_url
            having count(*) > 1
          )
          select v.name || ' [' || coalesce(v.city,'?') || ']' as venue,
                 (select count(*) from events e where e.venue_id = v.id) as events,
                 left(v.photo_url, 40) as photo
          from venues v
          join grp g on g.photo_url = v.photo_url
          order by v.photo_url, v.name;

          \echo ''
          \echo '== 2) Same city, within 150m, BOTH have events (fallback cluster excluded) =='
          -- Exclude the geocoding-fallback pileup: many venues share one bogus
          -- point. Requiring a named city + events on both sides keeps this to
          -- pairs a real person could actually have visited twice.
          select coalesce(a.city,'?') as city,
                 a.name as name_a, b.name as name_b,
                 round(extensions.ST_Distance(a.location, b.location)::numeric, 0) as meters,
                 (select count(*) from events e where e.venue_id = a.id) as ev_a,
                 (select count(*) from events e where e.venue_id = b.id) as ev_b
          from venues a
          join venues b
            on a.id < b.id
           and lower(coalesce(a.city,'')) = lower(coalesce(b.city,''))
           and a.location is not null and b.location is not null
           and extensions.ST_DWithin(a.location, b.location, 150)
          where a.city is not null and lower(a.city) not in ('', 'unknown')
            and exists (select 1 from events e where e.venue_id = a.id)
            and exists (select 1 from events e where e.venue_id = b.id)
          order by (
            (select count(*) from events e where e.venue_id = a.id) +
            (select count(*) from events e where e.venue_id = b.id)
          ) desc, city
          limit 200;

          \echo ''
          \echo '== 3) Identical normalized name + city =='
          with n as (
            select id, name, city,
                   trim(regexp_replace(lower(name), '[^a-z0-9]+', ' ', 'g')) as nn
            from venues
          )
          select nn as normalized_name, coalesce(city,'?') as city,
                 count(*) as n, string_agg(name, '  |  ') as venues
          from n
          group by nn, city
          having count(*) > 1
          order by n desc, nn;

          \echo ''
          \echo '== 4) Mojibake names (UTF-8 mis-decoded as latin1) =='
          -- These are a data-quality issue in their own right; some also have a
          -- correctly-encoded twin in the same city that is a true duplicate.
          select coalesce(city,'?') as city, name,
                 (select count(*) from events e where e.venue_id = v.id) as events
          from venues v
          where name like '%' || chr(195) || '%'
          order by city, name;

          rollback;
          SQL

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::audit-duplicate-venues skipped — set the DATABASE_URL repository secret to enable."
