name: Apply event_logs index + lists follows policy

# One-time DDL apply for the event_logs(user_id, event_date) index and the
# additive lists SELECT policy that lets active followers read a private
# creator's lists. Run manually once the migration is on main. Idempotent
# (create index if not exists; drop-if-exists then create policy), safe to
# re-run.
#
# Requires repository secret DATABASE_URL (direct Postgres). Default is a dry
# run that wraps the apply in a rolled-back transaction to validate it runs
# clean before committing.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Roll back after applying (validate only)"
        type: boolean
        default: true

concurrency:
  group: apply-event-logs-index-lists-follows
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/20260701_event_logs_index_and_lists_follows.sql

      - name: Validate (rolled back)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run == 'true' }}
        run: |
          { echo "BEGIN;"; cat supabase/migrations/20260701_event_logs_index_and_lists_follows.sql; echo "ROLLBACK;"; } \
            | psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f -

      - name: Smoke test (index + policy exist)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "select indexname from pg_indexes where indexname = 'idx_event_logs_user_date';"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "select polname from pg_policy where polname = 'lists_followers_of_creator_select';"

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::apply-event-logs-index-lists-follows skipped — set the DATABASE_URL repository secret to enable."
