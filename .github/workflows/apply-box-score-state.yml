name: Apply box_score_state migration

# One-time DDL apply for the per-event box-score ingest state column, its partial
# index, the event_logs trigger that seeds it, and the backfill of existing rows.
# Run manually (Actions -> this workflow -> Run workflow) once the migration file
# is on main. The migration is idempotent (add column if not exists, create index
# if not exists, create or replace function, drop/create trigger, and backfills
# guarded by `box_score_state is null`), so it is safe to re-run.
#
# Requires repository secret DATABASE_URL (direct Postgres). Default is a dry run
# that wraps the apply in a rolled-back transaction so you can validate it runs
# clean before committing the change.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Roll back after applying (validate only)"
        type: boolean
        default: true

concurrency:
  group: apply-box-score-state
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply migration
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/20260629_box_score_state.sql

      - name: Validate (rolled back)
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run == 'true' }}
        run: |
          { echo "BEGIN;"; cat supabase/migrations/20260629_box_score_state.sql; echo "ROLLBACK;"; } \
            | psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f -

      - name: Report counts
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "select coalesce(box_score_state,'(null)') as state, count(*) from public.events group by 1 order by 2 desc;"

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::apply-box-score-state skipped — set the DATABASE_URL repository secret to enable."
