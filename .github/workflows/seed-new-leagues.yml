name: Backfill new leagues

# One-time historical backfill for leagues newly added to the app. Run manually
# (Actions -> this workflow -> Run workflow) once the leagues migration is on
# main. It:
#   1. inserts the league rows (idempotent; the seeder skips a league whose row
#      is missing, so this must run first),
#   2. seeds teams/venues/events from ESPN back to --from for parity with the
#      other soccer leagues,
#   3. geocodes the newly created venues so they show up in "happening around
#      you" and can match photos (still needs venues-geo.json regenerated and
#      committed afterward, which is a separate local step),
#   4. rebuilds the soccer "Grounds" system lists.
#
# The seeded leagues are kept FRESH going forward by the Vercel /api/sync-events
# cron, so they are intentionally NOT added to the recurring event-sync.yml.
#
# Requires repository secret DATABASE_URL (direct Postgres). Geocoding also needs
# SUPABASE_PAT + SUPABASE_PROJECT. Default is a dry run; flip the input off to
# write. Safe to re-run: events dedupe by ESPN id, league rows ON CONFLICT, and
# clubs/national teams are reused across competitions (sharedTeams in the seeder).

on:
  workflow_dispatch:
    inputs:
      migration:
        description: "League-rows migration file to apply first"
        type: string
        default: "supabase/migrations/20260630_add_soccer_competitions.sql"
      from:
        description: "Backfill start date (YYYY-MM-DD)"
        type: string
        # Deep history for parity with the existing leagues. ESPN has the UEFA
        # club competitions and most domestic cups back to the early 2000s;
        # pre-coverage years just sweep empty (harmless). The seeder only inserts
        # completed events it actually finds.
        default: "2002-01-01"
      leagues:
        description: "Leagues to seed (comma-separated)"
        type: string
        default: "uefa.champions,uefa.europa,uefa.europa.conf,uefa.nations,eng.fa,eng.league_cup,esp.copa_del_rey,ita.coppa_italia,ger.dfb_pokal,fra.coupe_de_france,eng.2,por.1,ned.1,sco.1,concacaf.leagues.cup,concacaf.champions,conmebol.america,concacaf.gold,conmebol.libertadores,fifa.cwc"
      dry_run:
        description: "Roll back all DB changes (validate only)"
        type: boolean
        default: true

concurrency:
  group: seed-new-leagues
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
      SUPABASE_PROJECT: ${{ secrets.SUPABASE_PROJECT }}
      DRY: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Insert the league rows first (the seeder requires them to pre-exist).
      # Skipped on a dry run so a validate-only pass touches nothing.
      - name: Insert league rows
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "${{ github.event.inputs.migration }}"

      - name: Seed teams / venues / events
        if: ${{ env.DATABASE_URL != '' }}
        run: node scripts/data/seed-real-data.mjs --leagues=${{ github.event.inputs.leagues }} --from=${{ github.event.inputs.from }} $DRY

      # Geocode the venues just created so they aren't invisible on the map.
      # venues-geo.json (the photo-finder radius file) must still be regenerated
      # and committed locally afterward.
      - name: Geocode new venues
        if: ${{ env.DATABASE_URL != '' && env.SUPABASE_PAT != '' && github.event.inputs.dry_run != 'true' }}
        run: node scripts/data/geocode-venues.mjs --limit=500

      # Fill venue photos (Wikipedia infobox image) for any venue still missing
      # one, so the new leagues' venues look the same as the rest. Idempotent:
      # venues that already have photo_url are skipped.
      - name: Seed venue images
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: node scripts/data/seed-venue-images.mjs

      # Rebuild the per-league "Grounds" system lists from each domestic soccer
      # league's latest season (idempotent: drops + recreates the soccer Grounds
      # lists). Picks up newly seeded domestic leagues. Harmless for non-domestic
      # backfills — it just refreshes the existing soccer lists.
      - name: Build soccer Grounds lists
        if: ${{ env.DATABASE_URL != '' && github.event.inputs.dry_run != 'true' }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/data/010-soccer-grounds-lists.sql

      - name: Notice when nothing ran
        if: ${{ env.DATABASE_URL == '' }}
        run: echo "::warning::seed-new-leagues skipped — set the DATABASE_URL repository secret to enable."
