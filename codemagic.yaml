# Cloud build for the BoxdSeats iOS app → TestFlight.
# Builds the Capacitor shell in ios-app/ on a cloud Mac and uploads to
# TestFlight — no local Mac or USB needed. Drive it from the Codemagic web
# dashboard (works from an iPad).
#
# Prerequisites (set up once in the Codemagic UI, all from a browser):
#  1. Apple Developer Program membership ($99/yr).
#  2. An App Store Connect API key (App Store Connect → Users and Access →
#     Integrations → App Store Connect API → generate; download the .p8, note
#     the Key ID + Issuer ID).
#  3. In Codemagic: Teams/App settings → add that key as an "App Store Connect"
#     integration, and name it exactly: "BoxdSeats ASC".
#  4. Register the bundle id com.boxdseats.app and create the app in App Store
#     Connect (name "BoxdSeats").
#
# This is a first-pass config — expect a round or two of tweaks from the build
# logs (signing + the subfolder build are the usual spots).

workflows:
  ios-testflight:
    name: BoxdSeats iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BoxdSeats ASC
    environment:
      # Signing is done explicitly in a script step below (so it produces a
      # real log) rather than via Codemagic's managed `ios_signing` block,
      # whose failures surface as an opaque pre-build error with no log.
      # The "ios_signing" group must define (both Secure):
      #   IOS_DIST_CERT           – base64 of the distribution .p12
      #   IOS_DIST_CERT_PASSWORD  – the .p12 password
      groups:
        - ios_signing
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install web deps + create the iOS project
        script: |
          cd ios-app
          npm install
          CI=1 npx cap add ios 2>/dev/null || true
      - name: Generate app icon + splash from the brand logo
        script: |
          cd ios-app
          npx @capacitor/assets generate --ios \
            --splashBackgroundColor '#0D0F14' \
            --splashBackgroundColorDark '#0D0F14'
      - name: Add photo-permission string + sync native deps
        script: |
          cd ios-app
          PLIST=ios/App/App/Info.plist
          DESC="BoxdSeats reads the date and location saved in your photos to find games you've attended. Your photos aren't uploaded."
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string $DESC" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription $DESC" "$PLIST"
          # App uses only standard HTTPS/TLS (exempt encryption) — declare it so
          # TestFlight doesn't block every build on the export-compliance prompt.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          CI=1 npx cap sync ios
      - name: Set build number
        script: |
          cd ios-app/ios/App
          agvtool new-version -all "$(($(date +%s) / 60))"
      - name: Set up code signing
        script: |
          cd ios-app
          keychain initialize
          # Import the distribution certificate + private key (created via the
          # App Store Connect API and supplied as a base64 .p12 env var).
          echo "$IOS_DIST_CERT" | base64 --decode > /tmp/dist.p12
          keychain add-certificates \
            --certificate /tmp/dist.p12 \
            --certificate-password "$IOS_DIST_CERT_PASSWORD"
          # The App Store provisioning profile already exists on the account;
          # download it (no --create needed) and apply it to the project.
          app-store-connect fetch-signing-files "com.boxdseats.app" \
            --type IOS_APP_STORE
          xcode-project use-profiles
      - name: Build the IPA
        script: |
          cd ios-app
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"
    artifacts:
      - ios-app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
