# Cloud build for the BoxdSeats iOS app → TestFlight.
# Builds the Capacitor shell in ios-app/ on a cloud Mac and uploads to
# TestFlight — no local Mac or USB needed. Drive it from the Codemagic web
# dashboard (works from an iPad).
#
# Prerequisites (set up once in the Codemagic UI, all from a browser):
#  1. Apple Developer Program membership ($99/yr).
#  2. An App Store Connect API key (App Store Connect → Users and Access →
#     Integrations → App Store Connect API → generate; download the .p8, note
#     the Key ID + Issuer ID).
#  3. In Codemagic: Teams/App settings → add that key as an "App Store Connect"
#     integration, and name it exactly: "BoxdSeats ASC".
#  4. Register the bundle id com.boxdseats.app and create the app in App Store
#     Connect (name "BoxdSeats").
#
# This is a first-pass config — expect a round or two of tweaks from the build
# logs (signing + the subfolder build are the usual spots).

workflows:
  ios-testflight:
    name: BoxdSeats iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BoxdSeats ASC
    environment:
      # Signing is done explicitly in a script step below (so it produces a
      # real log) rather than via Codemagic's managed `ios_signing` block,
      # whose failures surface as an opaque pre-build error with no log.
      # The "ios_signing" group must define (both Secure):
      #   IOS_DIST_CERT           – base64 of the distribution .p12
      #   IOS_DIST_CERT_PASSWORD  – the .p12 password
      groups:
        - ios_signing
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install web deps + create the iOS project
        script: |
          cd ios-app
          npm install
          CI=1 npx cap add ios 2>/dev/null || true
      - name: Generate app icon + splash from the brand logo
        script: |
          cd ios-app
          npx @capacitor/assets generate --ios \
            --splashBackgroundColor '#0D0F14' \
            --splashBackgroundColorDark '#0D0F14'
      - name: Add photo-permission string + sync native deps
        script: |
          cd ios-app
          PLIST=ios/App/App/Info.plist
          DESC="BoxdSeats reads the date and location saved in your photos to find games you've attended. Your photos aren't uploaded."
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string $DESC" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription $DESC" "$PLIST"
          # App uses only standard HTTPS/TLS (exempt encryption) — declare it so
          # TestFlight doesn't block every build on the export-compliance prompt.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          CI=1 npx cap sync ios
      - name: Enable push entitlement (aps-environment)
        script: |
          cd ios-app
          # Push capability can't be toggled in Xcode's UI on CI, so write the
          # entitlements file and point the App target at it programmatically.
          cat > ios/App/App/App.entitlements <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          PLIST
          gem install xcodeproj --no-document >/dev/null 2>&1 || sudo gem install xcodeproj --no-document
          ruby -e '
            require "xcodeproj"
            p = Xcodeproj::Project.open("ios/App/App.xcodeproj")
            t = p.targets.find { |x| x.name == "App" }
            t.build_configurations.each { |c| c.build_settings["CODE_SIGN_ENTITLEMENTS"] = "App/App.entitlements" }
            p.save
            puts "CODE_SIGN_ENTITLEMENTS set for App target"
          '
      - name: Set build number
        script: |
          cd ios-app/ios/App
          agvtool new-version -all "$(($(date +%s) / 60))"
      - name: Set up code signing
        script: |
          cd ios-app
          keychain initialize
          # Distribution cert .p12 (base64) created via the App Store Connect API.
          echo "$IOS_DIST_CERT" | base64 --decode > /tmp/dist.p12
          echo "== p12 size: $(wc -c < /tmp/dist.p12) bytes =="
          # Extract the private key (macOS openssl reads the legacy p12 natively;
          # fall back to -legacy for an OpenSSL 3 toolchain).
          openssl pkcs12 -in /tmp/dist.p12 -passin pass:"$IOS_DIST_CERT_PASSWORD" -nodes -nocerts -out /tmp/dist_key_raw.pem 2>/dev/null \
            || openssl pkcs12 -legacy -in /tmp/dist.p12 -passin pass:"$IOS_DIST_CERT_PASSWORD" -nodes -nocerts -out /tmp/dist_key_raw.pem
          # openssl prepends "Bag Attributes"/localKeyID text before the PEM block,
          # which fetch-signing-files rejects — keep only the key block.
          sed -n '/-----BEGIN/,/-----END/p' /tmp/dist_key_raw.pem > /tmp/dist_key.pem
          echo "== private key extracted: $(grep -c 'PRIVATE KEY' /tmp/dist_key.pem) =="
          keychain add-certificates --certificate /tmp/dist.p12 --certificate-password "$IOS_DIST_CERT_PASSWORD"
          echo "== code-signing identities in keychain: =="
          security find-identity -v -p codesigning || true
          # Hand the private key to fetch-signing-files so it matches our existing
          # distribution certificate and downloads the App Store profile for it.
          app-store-connect fetch-signing-files "com.boxdseats.app" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/dist_key.pem \
            --create
          echo "== project bundle id: =="
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -showBuildSettings 2>/dev/null | grep PRODUCT_BUNDLE_IDENTIFIER | head -3 || true
          xcode-project use-profiles
      - name: Build the IPA
        script: |
          cd ios-app
          xcode-project build-ipa --workspace "ios/App/App.xcworkspace" --scheme "App"
    artifacts:
      - ios-app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
